spring:
  # H2
  h2:
    console:
      enabled: true
      path: /h2
  datasource:
    url: jdbc:h2:mem:test
    username: root
    password: 1234

  # JPA
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        #show_sql: true
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # Redis
  data:
    redis:
      enabled: true
      host: 127.0.0.1
      port: 6379
      connect-timeout: 5000ms
      read-timeout: 5000ms
      use-pool: true
      check-connection: true
      lettuce:
        pool:
          enabled: true
          max-active: 50
          max-idle: 10
          min-idle: 0
          max-wait: 3000ms
          min-evictable-idle-time: 60000ms
          time-between-eviction-runs: 30000ms
      topic:
        enabled: true
        event: event

# Thread Pool
task:
  executor:
    core:
      pool:
        size: 10
    max:
      pool:
        size: 15
    queue:
      capacity: 20